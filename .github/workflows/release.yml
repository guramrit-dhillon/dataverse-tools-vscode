  detect-changes:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compare versions against previous tag
        id: changed
        run: |
          # Get the previous tag (second most recent)
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          echo "Previous tag: $PREV_TAG"

          EXTENSIONS=()
          # for dir in \
          #   packages/dataverse-environments \
          #   packages/dataverse-assemblies \
          #   packages/dataverse-metadata \
          #   packages/dataverse-assembly-decompiler \
          #   packages/dataverse-plugin-trace-viewer \
          #   packages/fetchxml-builder \
          #   packages/dataverse-query-analyzer \
          #   packages/dataverse-workflows; do

          for dir in \
            packages/dataverse-environments \
            packages/dataverse-plugin-trace-viewer \
            packages/fetchxml-builder \
            packages/dataverse-query-analyzer \
            packages/dataverse-workflows; do

            ext=$(basename "$dir")

            # Get version from previous tag (default 0.0.0 if package didn't exist)
            OLD_VER=$(git show "${PREV_TAG}:${dir}/package.json" 2>/dev/null \
              | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null \
              || echo "0.0.0")

            NEW_VER=$(node -p "require('./${dir}/package.json').version")

            echo "  $ext: $OLD_VER → $NEW_VER"
            if [ "$OLD_VER" != "$NEW_VER" ]; then
              EXTENSIONS+=("\"$ext\"")
            fi
          done

          if [ ${#EXTENSIONS[@]} -eq 0 ]; then
            echo "No extensions changed."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"extension\":[]}" >> "$GITHUB_OUTPUT"
          else
            JOINED=$(IFS=,; echo "${EXTENSIONS[*]}")
            echo "Changed extensions: $JOINED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"extension\":[${JOINED}]}" >> "$GITHUB_OUTPUT"
          fi

  package:
    name: Package VSIX (${{ matrix.extension }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    # needs: [detect-changes, build-dotnet]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm install -g @vscode/vsce

      # - name: Download all .NET binaries
      #   if: matrix.extension == 'dataverse-assemblies' || matrix.extension == 'dataverse-assembly-decompiler'
      #   uses: actions/download-artifact@v4
      #   with:
      #     pattern: "{analyzer,decompiler}-*"
      #     merge-multiple: false

      # - name: Copy analyzer binaries into package
      #   if: matrix.extension == 'dataverse-assemblies'
      #   run: |
      #     for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
      #       mkdir -p packages/dataverse-assembly-analyzer/bin/$rid
      #       cp -r analyzer-$rid/* packages/dataverse-assembly-analyzer/bin/$rid/
      #     done

      # - name: Copy decompiler binaries into package
      #   if: matrix.extension == 'dataverse-assembly-decompiler'
      #   run: |
      #     for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
      #       mkdir -p packages/assembly-decompiler/bin/$rid
      #       cp -r decompiler-$rid/* packages/assembly-decompiler/bin/$rid/
      #     done

      - name: Detect pre-release from tag
        id: prerelease
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == *-* ]]; then
            echo "flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension
        run: npm run build -w ${{ matrix.extension }}

      - name: Package VSIX
        run: vsce package -o ${{ matrix.extension }}.vsix ${{ steps.prerelease.outputs.flag }}
        working-directory: packages/${{ matrix.extension }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.extension }}
          path: packages/${{ matrix.extension }}/${{ matrix.extension }}.vsix

  release:
    name: Create Release
    needs: package
    if: always() && needs.package.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.vsix"

  publish:
    name: Publish (${{ matrix.extension }})
    needs: [detect-changes, package]
    if: always() && needs.package.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix-${{ matrix.extension }}

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Detect pre-release flag
        id: prerelease
        run: |
          # Use the tag name as the source of truth: v1.0.0-preview, v1.0.0-beta, etc.
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == *-* ]]; then
            echo "flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath ${{ matrix.extension }}.vsix ${{ steps.prerelease.outputs.flag }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: ovsx publish ${{ matrix.extension }}.vsix ${{ steps.prerelease.outputs.flag }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
