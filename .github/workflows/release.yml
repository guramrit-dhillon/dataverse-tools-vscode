  package:
    name: Package VSIX (${{ matrix.extension }})
    # needs: build-dotnet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension:
          - dataverse-environments
          # - dataverse-assemblies
          # - dataverse-metadata
          # - dataverse-assembly-decompiler
          - dataverse-plugin-trace-viewer
          - fetchxml-builder
          - dataverse-query-analyzer
          - dataverse-workflows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm install -g @vscode/vsce

      # - name: Download all .NET binaries
      #   if: matrix.extension == 'dataverse-assemblies' || matrix.extension == 'dataverse-assembly-decompiler'
      #   uses: actions/download-artifact@v4
      #   with:
      #     pattern: "{analyzer,decompiler}-*"
      #     merge-multiple: false

      # - name: Copy analyzer binaries into package
      #   if: matrix.extension == 'dataverse-assemblies'
      #   run: |
      #     for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
      #       mkdir -p packages/dataverse-assembly-analyzer/bin/$rid
      #       cp -r analyzer-$rid/* packages/dataverse-assembly-analyzer/bin/$rid/
      #     done

      # - name: Copy decompiler binaries into package
      #   if: matrix.extension == 'dataverse-assembly-decompiler'
      #   run: |
      #     for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
      #       mkdir -p packages/assembly-decompiler/bin/$rid
      #       cp -r decompiler-$rid/* packages/assembly-decompiler/bin/$rid/
      #     done

      - name: Detect pre-release version
        id: prerelease
        run: |
          VERSION=$(node -p "require('./packages/${{ matrix.extension }}/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            CLEAN=${VERSION%%-*}
            echo "flag=--pre-release" >> "$GITHUB_OUTPUT"
            cd packages/${{ matrix.extension }}
            npm version "$CLEAN" --no-git-tag-version
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension
        run: npm run build -w ${{ matrix.extension }}

      - name: Package VSIX
        run: vsce package -o ${{ matrix.extension }}.vsix ${{ steps.prerelease.outputs.flag }}
        working-directory: packages/${{ matrix.extension }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.extension }}
          path: packages/${{ matrix.extension }}/${{ matrix.extension }}.vsix

  release:
    name: Create Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.vsix"

  publish:
    name: Publish (${{ matrix.extension }})
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      max-parallel: 1
      matrix:
        extension:
          - dataverse-environments
          - fetchxml-builder
          # - dataverse-assemblies
          # - dataverse-metadata
          - dataverse-plugin-trace-viewer
          # - dataverse-assembly-decompiler
          - dataverse-query-analyzer
          - dataverse-workflows
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix-${{ matrix.extension }}

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Detect pre-release flag
        id: prerelease
        run: |
          # Check if the VSIX was built as pre-release by inspecting the package.json in the artifact
          # We use the tag name as the source of truth: v1.0.0-preview, v1.0.0-beta, etc.
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == *-* ]]; then
            echo "flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath ${{ matrix.extension }}.vsix ${{ steps.prerelease.outputs.flag }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: ovsx publish ${{ matrix.extension }}.vsix ${{ steps.prerelease.outputs.flag }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
